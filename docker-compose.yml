services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: resumeai
      POSTGRES_PASSWORD: resumeai
      POSTGRES_DB: resumeai
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resumeai"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: ./backend/.env.example
    deploy:
      replicas: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: arq app.contexts.transactions.infrastructure.worker.WorkerSettings
    env_file: ./backend/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - api

  rpa-bot:
    build: ./rpa
    environment:
      BASE_URL: http://nginx:80
    profiles: ["rpa"]  # run on demand: docker compose run --rm rpa-bot
    depends_on:
      - nginx

  frontend-admin:
    build:
      context: ./frontend-admin
      args:
        VITE_API_URL: http://localhost:8080
    ports:
      - "5173:80"
    depends_on:
      - nginx

  frontend-tienda:
    build:
      context: ./frontend-tienda
      args:
        VITE_API_URL: http://localhost:8080
    ports:
      - "5174:80"
    depends_on:
      - nginx

  docs:
    image: squidfunk/mkdocs-material:9
    command: serve --dev-addr=0.0.0.0:8000 -f /docs/mkdocs.yml
    working_dir: /docs
    volumes:
      - ./docs:/docs
    ports:
      - "8000:8000"
    profiles: ["docs"]  # optional: docker compose --profile docs up docs

volumes:
  pgdata:
